<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSCC Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div id="header-content">
            <h1 style="font-family: sans-serif; color: white; padding: 10px;">NSCC</h1>
            <img src="images/OIP.webp" alt="NSCC Logo">
        </div>
        <nav>
                <a href="Home.html">Home / About us</a>
                <a href="Sessions.html">Sessions</a>
                <a href="Contact.html">Contact</a>
                <a href="#" style="border: 1px solid white;">Login</a>
        </nav>
    </header>
    <div style="width: 100%; display: flex; justify-content: center; padding: 20px;">
        <div class="content-login">
            <h2>Login to your account</h2>
            <form action="#" method="#">   
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required placeholder="Enter Username">
                <br><br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required placeholder="Enter Password">
                <br><br>
                <button type="submit">Munch</button>
            </form>
        </div>
    </div>
        <footer>
        <div id="Newsletter-subscription">
            <h3>Subscribe to our newsletter</h3>
            <form action="#" method="#">
                <input type="email" name="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
        <hr>
        <h6>PO Box 33104 Takapuna Auckland 0622</h6>
        <h6>© 2026 North Shore Canoe Club</h6>
    </footer>
</body>
</html>
</body>
</html>
